<!-- Email signature — paste into Zoho Mail / Outlook / Gmail signature settings -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family:Tahoma,Geneva,Verdana,sans-serif;border-collapse:collapse;">
  <!-- Row 1: Name -->
  <tr>
    <td style="font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:12pt;font-weight:bold;color:#000000;line-height:1.2;padding:0;">
      [YOUR_NAME]
    </td>
  </tr>
  <!-- Row 2: Title -->
  <tr>
    <td style="font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:9pt;font-weight:normal;color:#000000;line-height:1.2;padding:2px 0 12px 0;">
      [YOUR_TITLE]
    </td>
  </tr>
  <!-- Row 3: Logo + divider + contact block -->
  <tr>
    <td style="padding:0;">
      <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <!-- Logo -->
          <td style="vertical-align:middle;padding-right:16px;">
            <img src="[YOUR_LOGO_URL]" alt="[YOUR_COMPANY]" width="130" style="display:block;border:0;">
          </td>
          <!-- Divider -->
          <td style="vertical-align:middle;border-left:2px solid #6aaa64;width:1px;font-size:0;line-height:0;">&nbsp;</td>
          <!-- Contact block -->
          <td style="vertical-align:middle;padding-left:16px;">
            <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:9pt;">
              <tr>
                <td style="vertical-align:middle;padding:2px 8px 2px 0;">
                  <img src="https://img.icons8.com/ios-filled/16/6aaa64/phone.png" width="15" height="15" alt="phone" style="display:block;border:0;">
                </td>
                <td style="vertical-align:middle;padding:2px 0;">
                  <a href="tel:[YOUR_PHONE_RAW]" style="color:#000000;text-decoration:none;font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:9pt;">[YOUR_PHONE]</a>
                </td>
              </tr>
              <tr>
                <td style="vertical-align:middle;padding:2px 8px 2px 0;">
                  <img src="https://img.icons8.com/ios-filled/16/6aaa64/link.png" width="15" height="15" alt="website" style="display:block;border:0;">
                </td>
                <td style="vertical-align:middle;padding:2px 0;">
                  <a href="[YOUR_WEBSITE_URL]" style="color:#000000;text-decoration:none;font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:9pt;">[YOUR_WEBSITE]</a>
                </td>
              </tr>
              <tr>
                <td style="vertical-align:middle;padding:2px 8px 2px 0;">
                  <img src="https://img.icons8.com/ios-filled/16/6aaa64/linkedin.png" width="15" height="15" alt="linkedin" style="display:block;border:0;">
                </td>
                <td style="vertical-align:middle;padding:2px 0;">
                  <a href="[YOUR_LINKEDIN_URL]" style="color:#000000;text-decoration:none;font-family:Tahoma,Geneva,Verdana,sans-serif;font-size:9pt;">[YOUR_LINKEDIN]</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
